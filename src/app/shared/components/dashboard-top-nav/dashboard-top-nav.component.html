<header class="w-full flex items-center justify-between px-8 py-5 border-b border-white/5 bg-background">
  <div class="flex items-center gap-10">

    <nav class="hidden md:flex items-center gap-8 text-sm">
      <a href="#" class="text-primary font-medium border-b-2 border-primary pb-1 relative top-px">Dashboard</a>
      <a href="#" class="text-on-surface-variant hover:text-on-surface transition-colors pb-1">Staff Management</a>
      <a href="#" class="text-on-surface-variant hover:text-on-surface transition-colors pb-1">Analytics</a>
    </nav>
  </div>

  <div class="flex items-center gap-6">
    <button class="text-on-surface-variant hover:text-on-surface transition-colors relative">
      <span class="icon-[lucide--bell] w-5 h-5"></span>
      <!-- Notification dot -->
      <span class="absolute top-0 right-0 w-2 h-2 bg-primary rounded-full border border-background"></span>
    </button>
    <button class="text-on-surface-variant hover:text-on-surface transition-colors">
      <span class="icon-[lucide--settings] w-5 h-5"></span>
    </button>
    <button
      class="w-8 h-8 rounded-full bg-surface-highest border border-white/10 flex items-center justify-center overflow-hidden">
      <!-- Avatar placeholder -->
      <div class="w-full h-full bg-linear-to-tr from-primary/20 to-blue-500/20 flex items-center justify-center">
        <span class="icon-[lucide--user] w-4 h-4 text-on-surface"></span>
      </div>
    </button>
  </div>
</header>
