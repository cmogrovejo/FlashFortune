<main class="min-h-screen bg-background flex flex-col items-center justify-center p-4 relative overflow-hidden">

  <!-- Background Watermarks -->
  <div
    class="absolute bottom-0 left-0 text-[15rem] font-bold text-white/2 leading-none select-none pointer-events-none -mb-16 -ml-8 tracking-tighter">
    MBNK
  </div>
  <div
    class="absolute bottom-0 right-0 text-[15rem] font-bold text-white/2 leading-none select-none pointer-events-none -mb-16 -mr-8 tracking-tighter">
    VLT
  </div>

  <!-- Header: Logo Area -->
  <header class="flex flex-col items-center mb-8 animate-vault-entry relative z-10">
    <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mb-4 border border-white/5">
      <span class="icon-[lucide--landmark] w-8 h-8 text-black" aria-hidden="true"></span>
    </div>
    <h1 class="text-2xl font-bold tracking-tight display-txt flex items-center gap-1">
      <span class="text-primary">Flash</span><span class="text-on-surface">Fortune</span>
    </h1>
  </header>

  <!-- Recovery Card -->
  <section class="vault-card w-full max-w-md animate-vault-entry relative z-10">
    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-on-surface">Recover Access</h2>
      <p class="text-sm text-on-surface-variant mt-2 leading-relaxed">Enter your corporate email address and we will
        send you a link to reset your password.</p>
    </div>

    <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

      <!-- Email Field -->
      <app-vault-input-wrapper label="Corporate Email" forId="email" startIcon="icon-[lucide--mail]">
        <input type="email" id="email" formControlName="email" class="vault-input w-full pl-10"
          placeholder="name@moonshotbank.com">
      </app-vault-input-wrapper>

      <!-- Submit Button -->
      <button [disabled]="recoveryForm.invalid" type="submit"
        class="btn btn-primary w-full py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed text-base font-medium text-black shadow-[0_0_15px_-3px_var(--color-primary-container)]">
        Send Recovery Link
      </button>

      <!-- Back to Login -->
      <div class="mt-4 text-center">
        <a routerLink="/login"
          class="text-tertiary hover:text-white transition-colors text-sm flex items-center justify-center gap-2">
          <span class="icon-[lucide--arrow-left] w-4 h-4" aria-hidden="true"></span>
          Back to Login
        </a>
      </div>

    </form>
  </section>
</main>
