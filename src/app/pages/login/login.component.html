<main class="min-h-screen bg-background flex flex-col items-center justify-center p-4">
  <!-- Header: Logo Area -->
  <header class="flex flex-col items-center mb-8 animate-vault-entry">
    <div class="w-16 h-16 bg-surface-highest rounded-2xl flex items-center justify-center mb-4 border border-white/5">
      <span class="icon-[lucide--lock] w-8 h-8 text-primary" aria-hidden="true"></span>
    </div>
    <h1 class="text-3xl font-bold tracking-tight display-txt">
      <span class="text-on-surface">Flash</span><span class="text-primary">Fortune</span>
    </h1>
    <p class="text-on-surface-variant text-xs mt-2 uppercase tracking-widest">A Financial Raffle
      Management System</p>
  </header>

  <!-- Login Card -->
  <section class="vault-card w-full max-w-md animate-vault-entry">
    <div class="mb-6">
      <h2 class="text-xl font-medium text-on-surface">System Access</h2>
      <p class="text-sm text-on-surface-variant mt-1">Please enter your authorized credentials.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">




      <!-- Email Field -->
      <div class="flex flex-col gap-1.5">
        <label for="email" class="label-txt text-xs text-on-surface-variant">Corporate Email</label>
        <div class="relative flex items-center">
          <div class="absolute left-4 text-on-surface-variant select-none flex items-center">
            <span class="icon-[lucide--mail] w-4 h-4"></span>
          </div>
          <input type="email" id="email" formControlName="email" class="vault-input w-full pl-10"
            placeholder="user@company.com">
        </div>
      </div>

      <!-- Password Field -->
      <div class="flex flex-col gap-1.5">
        <label for="password" class="label-txt text-xs text-on-surface-variant">Password</label>
        <div class="relative flex items-center">
          <div class="absolute left-4 text-on-surface-variant flex items-center">
            <span class="icon-[lucide--key] w-4 h-4" aria-hidden="true"></span>
          </div>
          <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" formControlName="password"
            class="vault-input w-full px-10" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
          <button type="button" (click)="togglePasswordVisibility()"
            class="absolute right-4 text-on-surface-variant hover:text-on-surface transition-colors">
            <!-- Eye Show -->
            @if(isPasswordVisible) {
            <span class="icon-[lucide--eye-off] w-4 h-4" aria-hidden="true"></span>
            } @else {
            <!-- Eye Hide -->
            <span class="icon-[lucide--eye] w-4 h-4" aria-hidden="true"></span>
            }
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button [disabled]="loginForm.invalid" type="submit"
        class="btn btn-primary w-full mt-2 py-3 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed text-base shadow-[0_0_15px_-3px_var(--color-primary-container)]">
        <span class="icon-[lucide--log-in] w-4 h-4 mr-2" aria-hidden="true"></span>
        Login
      </button>

      <!-- Divider -->
      <div class="relative flex py-2 items-center">
        <div class="grow border-t border-slate-500/15"></div>
        <span class="shrink-0 mx-4 text-on-surface-variant text-[10px] uppercase tracking-wider">Or continue with
          other methods</span>
        <div class="grow border-t border-slate-500/15"></div>
      </div>
      <!-- Social Providers -->
      <div class="grid grid-cols-3 gap-3">
        <!-- Google -->
        <button type="button"
          class="group bg-surface-highest/30 hover:bg-surface-highest/60 focus:bg-surface-highest/60 outline-none border border-primary/15 hover:border-primary/50 focus:border-primary/50 shadow-[0_0_15px_-3px_rgba(0,0,0,0)] hover:shadow-[0_0_15px_-3px_var(--color-primary-container)] focus:shadow-[0_0_15px_-3px_var(--color-primary-container)] transition-all duration-300 py-3 rounded-xl flex items-center justify-center relative overflow-hidden">
          <div
            class="absolute inset-0 bg-gradient-to-br from-primary/0 to-primary/0 group-hover:from-primary/5 group-hover:to-transparent transition-colors">
          </div>
          <span
            class="icon-[fa6-brands--google] w-5 h-5 text-on-surface-variant group-hover:text-primary group-focus:text-primary transition-colors relative z-10"
            aria-hidden="true"></span>
        </button>

        <!-- Apple ID -->
        <button type="button"
          class="group bg-surface-highest/30 hover:bg-surface-highest/60 focus:bg-surface-highest/60 outline-none border border-primary/15 hover:border-primary/50 focus:border-primary/50 shadow-[0_0_15px_-3px_rgba(0,0,0,0)] hover:shadow-[0_0_15px_-3px_var(--color-primary-container)] focus:shadow-[0_0_15px_-3px_var(--color-primary-container)] transition-all duration-300 py-3 rounded-xl flex items-center justify-center relative overflow-hidden">
          <div
            class="absolute inset-0 bg-gradient-to-br from-primary/0 to-primary/0 group-hover:from-primary/5 group-hover:to-transparent transition-colors">
          </div>
          <span
            class="icon-[fa6-brands--apple] w-5 h-5 text-on-surface-variant group-hover:text-primary group-focus:text-primary transition-colors relative z-10"
            aria-hidden="true"></span>
        </button>

        <!-- Facebook -->
        <button type="button"
          class="group bg-surface-highest/30 hover:bg-surface-highest/60 focus:bg-surface-highest/60 outline-none border border-primary/15 hover:border-primary/50 focus:border-primary/50 shadow-[0_0_15px_-3px_rgba(0,0,0,0)] hover:shadow-[0_0_15px_-3px_var(--color-primary-container)] focus:shadow-[0_0_15px_-3px_var(--color-primary-container)] transition-all duration-300 py-3 rounded-xl flex items-center justify-center relative overflow-hidden">
          <div
            class="absolute inset-0 bg-gradient-to-br from-primary/0 to-primary/0 group-hover:from-primary/5 group-hover:to-transparent transition-colors">
          </div>
          <span
            class="icon-[fa6-brands--facebook] w-5 h-5 text-on-surface-variant group-hover:text-primary group-focus:text-primary transition-colors relative z-10"
            aria-hidden="true"></span>
        </button>
      </div>


      <!-- Forgot Password -->
      <div class="mt-4 text-center">
        <a href="#" class="text-tertiary hover:text-white transition-colors text-xs font-medium">Forgot your password?
          &rarr;</a>
      </div>

    </form>
  </section>

  <!-- Footer Info -->
  <footer class="mt-12 flex flex-col items-center gap-4 animate-vault-entry">
    <div class="flex items-center gap-6">
      <div class="grow border-t border-white/5 w-12"></div>
      <div class="flex gap-4 text-on-surface-variant"></div>
      <div class="grow border-t border-white/5 w-12"></div>
    </div>
  </footer>
</main>
