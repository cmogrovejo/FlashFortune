<div
  class="w-full bg-surface-higher border border-white/5 rounded-2xl p-4 flex flex-col md:flex-row items-center gap-4">

  <!-- Search Input -->
  <div class="relative flex-1 w-full">
    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
      <span class="icon-[lucide--search] w-5 h-5 text-on-surface-variant"></span>
    </div>
    <input type="text" placeholder="Buscar por nombre, ID o premio..."
      class="w-full bg-surface border border-white/5 rounded-xl pl-12 pr-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all">
  </div>

  <!-- Right Actions -->
  <div class="flex items-center gap-4 w-full md:w-auto">

    <!-- Status Dropdown -->
    <div class="relative min-w-[140px]">
      <select
        class="w-full bg-surface border border-white/5 rounded-xl px-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all appearance-none cursor-pointer">
        <option value="" disabled selected hidden>Status</option>
        <option value="all">All</option>
        <option value="live">Live</option>
        <option value="ready">Ready</option>
        <option value="draft">Draft</option>
        <option value="ended">Ended</option>
      </select>
      <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
        <span class="icon-[lucide--chevron-down] w-4 h-4 text-on-surface-variant"></span>
      </div>
    </div>

    <!-- Date Range Picker -->
    <button
      class="bg-surface border border-white/5 hover:bg-surface-highest text-on-surface text-sm rounded-xl px-4 py-3 flex items-center gap-3 transition-colors min-w-[160px] justify-between">
      <div class="flex items-center gap-2">
        <span class="icon-[lucide--calendar] w-4 h-4 text-on-surface-variant"></span>
        <div class="flex flex-col items-start text-left leading-tight">
          <span class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold">Date</span>
          <span>Range</span>
        </div>
      </div>
    </button>

    <!-- Advanced Filter Button -->
    <button
      class="bg-surface border border-white/5 hover:bg-surface-highest text-on-surface rounded-xl p-3 flex items-center justify-center transition-colors aspect-square h-full">
      <span class="icon-[lucide--filter] w-5 h-5 text-on-surface-variant"></span>
    </button>

  </div>
</div>
